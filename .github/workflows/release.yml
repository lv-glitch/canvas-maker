name: Release

# Triggered when you push a version tag (e.g. `git tag v0.3.0 && git push --tags`).
# Builds signed + notarized DMGs for macOS (arm64 + x64) and uploads them to a
# GitHub Release. electron-updater in the installed app auto-discovers this feed
# and ships silent updates to staff on next launch.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_ID                    — Apple ID email with an active Developer account
#   APPLE_APP_SPECIFIC_PASSWORD — from https://account.apple.com → Sign-In and Security
#                                 → App-Specific Passwords (not your Apple ID password)
#   APPLE_TEAM_ID               — 10-char team id from developer.apple.com/account (top right)
#   CSC_LINK                    — base64-encoded .p12 signing cert:
#                                   base64 -i cert.p12 | pbcopy
#   CSC_KEY_PASSWORD            — password you set on the .p12 when exporting it
#
# GITHUB_TOKEN is provided automatically.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual triggering from the Actions tab

permissions:
  contents: write # needed to create/update the GitHub Release

jobs:
  release-mac:
    runs-on: macos-14 # Apple Silicon runner; can cross-build x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Apple's official action for macOS signing. Imports the .p12 into a
      # fresh keychain AND installs the Developer ID Intermediate CA — the
      # missing intermediate is what caused `codesign --display` to fail with
      # "No such process" in previous runs.
      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      # Each arch gets its own build → sign → notarize → publish cycle.
      # Running both in a single electron-builder invocation can trip up
      # @electron/notarize's signature pre-check on the 2nd arch.
      #
      # Note: we do NOT set CSC_LINK / CSC_KEY_PASSWORD as env vars here.
      # With those set, electron-builder creates its own temp keychain, which
      # doesn't see the Apple intermediate cert we just imported. By leaving
      # them unset, electron-builder finds the identity in the default
      # keychain set up by the apple-actions step above.

      - name: Build and publish arm64
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg --arm64 --publish always

      - name: Build and publish x64
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg --x64 --publish always
